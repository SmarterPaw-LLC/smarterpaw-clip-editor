<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meowi Clip Editor</title>
<style>
  @font-face{ font-family:'Cooper Std Black'; src:url('/editor/fonts/CooperBlack-Std.otf') format('opentype'); font-display:swap; }
  @font-face{ font-family:'Meowijuana'; src:url('/editor/fonts/meowijuana.ttf') format('truetype'); font-display:swap; }
  :root { --bg:#15171c; --panel:#1e2128; --panel2:#262a33; --line:#333845; --txt:#e6e8ee;
          --mut:#9aa3b2; --acc:#f5a623; --acc2:#5b8cff; --ok:#34c759; --bad:#ff5a5a; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { display:flex; align-items:center; gap:14px; padding:10px 16px; background:var(--panel);
           border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1 { font-size:15px; margin:0; font-weight:700; letter-spacing:.2px; }
  header .ver { font-size:11px; color:var(--mut); border:1px solid var(--line); border-radius:20px;
                padding:2px 8px; font-variant-numeric:tabular-nums; }
  header .sp { flex:1; }
  button { background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:7px;
           padding:7px 12px; cursor:pointer; font-size:13px; }
  button:hover { border-color:#4a5160; }
  button.primary { background:var(--acc); color:#1a1300; border-color:var(--acc); font-weight:700; }
  button.ghost { background:transparent; }
  button.mini { padding:3px 7px; font-size:12px; }
  select, input[type=text], input[type=number] { background:var(--panel2); color:var(--txt);
           border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; }
  .projbar { display:flex; align-items:center; gap:6px; padding:7px 16px; background:var(--panel);
             border-bottom:1px solid var(--line); }
  .projbar .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mut); margin-right:2px; }
  .projbar .sp { flex:1; }
  .projbar .cur { font-size:12px; color:var(--acc); font-weight:700; }
  .projbar select { min-width:160px; }
  .wrap { display:grid; grid-template-columns:240px 1fr 360px; gap:12px; padding:12px; height:calc(100vh - 99px); }
  .col { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:auto; }
  .col h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--mut);
            margin:0; padding:10px 12px; position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--line); z-index:2; }
  /* bin */
  .grp { padding:8px 10px 2px; font-size:11px; color:var(--acc); text-transform:uppercase; letter-spacing:.5px; }
  .clip { display:flex; gap:8px; padding:6px 10px; cursor:pointer; align-items:center; }
  .clip:hover { background:var(--panel2); }
  .clip img { width:54px; height:54px; object-fit:cover; border-radius:6px; background:#000; flex:none; }
  .clip .meta { flex:1; min-width:0; }
  .clip .meta b { display:block; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .clip .meta span { color:var(--mut); font-size:11px; }
  /* center */
  .center { display:flex; flex-direction:column; align-items:center; gap:10px; padding:12px; overflow:auto; }
  #stageWrap { position:relative; background:#000; border-radius:10px; overflow:hidden; box-shadow:0 6px 24px #0008; }
  #stage { display:block; width:100%; height:100%; }
  .clipvid { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; background:#000; }
  #capOverlay { position:absolute; left:6%; right:6%; text-align:center; color:#fff; font-weight:800;
                pointer-events:none; line-height:1.15; }
  #capOverlay span { background:rgba(0,0,0,.34); box-shadow:0 0 0 6px rgba(0,0,0,.34);
                     padding:.05em .15em; -webkit-text-stroke:2px rgba(0,0,0,.9); paint-order:stroke fill; }
  #endcard { position:absolute; inset:0; background:#111; display:none; flex-direction:column;
             align-items:center; justify-content:center; gap:2%; }
  #endcard img#ecLogo { width:80%; height:auto; display:none; margin-bottom:5%; }
  #endcard .l1 { color:#fff; font-weight:800; } #endcard .l2 { color:var(--acc); font-weight:800; }
  #endcard .l3 { color:#111; background:var(--acc); font-weight:800; padding:.25em .7em; border-radius:7px; margin-top:4%; }
  .transport { display:flex; gap:8px; align-items:center; }
  .scrub { width:100%; display:flex; gap:8px; align-items:center; }
  .scrub input[type=range] { flex:1; }
  .tcode { font-variant-numeric:tabular-nums; color:var(--mut); font-size:12px; min-width:90px; }
  .trim { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:10px; }
  .trim h3 { margin:0 0 8px; font-size:12px; color:var(--mut); text-transform:uppercase; letter-spacing:.5px; }
  .trim .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .trim label { font-size:12px; color:var(--mut); }
  /* timeline */
  .seg { background:var(--panel2); border:1px solid var(--line); border-radius:8px; margin:8px 10px; padding:8px; }
  .seg.sel { border-color:var(--acc2); box-shadow:0 0 0 1px var(--acc2); }
  .seg .top { display:flex; gap:6px; align-items:center; }
  .seg .hd { flex:1; font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .seg .nums { display:flex; gap:6px; margin:6px 0; }
  .seg .nums label { font-size:11px; color:var(--mut); display:flex; flex-direction:column; gap:2px; }
  .seg .nums input { width:62px; }
  .seg input.cap { width:100%; margin-top:4px; }
  .seg .cscrub-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .seg .cscrub { flex:1; min-width:0; height:18px; accent-color:var(--acc2); }
  .seg .csct { font-size:11px; color:var(--mut); min-width:44px; text-align:right; font-variant-numeric:tabular-nums; }
  .seg .cbtn { padding:2px 7px; font-size:11px; white-space:nowrap; }
  .seg .ctl { display:flex; gap:4px; }
  .settings { padding:10px 12px; border-top:1px solid var(--line); }
  .settings .row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
  .settings label { font-size:12px; color:var(--mut); min-width:64px; }
  .status { padding:8px 12px; font-size:12px; color:var(--mut); white-space:pre-wrap; max-height:120px; overflow:auto; }
  .pill { font-size:11px; color:var(--mut); border:1px solid var(--line); border-radius:20px; padding:2px 8px; }
  .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#000c; color:#fff;
           padding:10px 16px; border-radius:8px; display:none; z-index:20; border:1px solid var(--line); }
  .modal { position:fixed; inset:0; background:transparent; pointer-events:none; z-index:30; display:flex; align-items:stretch; justify-content:flex-end; }
  .modal-card { pointer-events:auto; background:var(--panel); border-left:1px solid var(--line); border-radius:0; width:430px; max-width:96vw; height:100vh; max-height:100vh; overflow:auto; box-shadow:-12px 0 34px #0009; }
  .modal-hd { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel); }
  .modal-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
  .modal-body .sec { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--acc); margin-top:4px; }
  .modal-body hr { border:none; border-top:1px solid var(--line); margin:6px 0; }
  .modal-body label { font-size:12px; color:var(--mut); display:inline-flex; align-items:center; gap:6px; margin-right:12px; }
  .modal-body label.ck { color:var(--txt); }
  .modal-body input[type=range] { vertical-align:middle; }
  .ecline { display:flex; flex-wrap:wrap; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:8px; }
  .ecline input.ecl-text { flex:1; min-width:120px; }
  .ecline input[type=color] { width:34px; height:26px; padding:0; border:none; background:none; }
  a.dl { color:var(--acc2); }
</style>
</head>
<body>
<header>
  <h1>🐾 Meowi Clip Editor</h1>
  <span class="ver" id="appVer">v1.2.2</span>
  <span class="pill" id="totalPill">–</span>
  <span class="sp"></span>
  <button class="ghost" id="btnReload">Reload clips</button>
  <button id="btnSave">Save</button>
  <button class="primary" id="btnRender">▶ Render MP4</button>
</header>

<div class="projbar">
  <span class="lbl">Project</span>
  <select id="projSelect" title="Saved projects"></select>
  <button class="mini" id="btnProjLoad">Load</button>
  <button class="mini" id="btnProjSave" title="Save changes to this project">Save</button>
  <button class="mini" id="btnProjSaveAs">Save As…</button>
  <button class="mini" id="btnProjNew">New</button>
  <button class="mini" id="btnProjDel" title="Delete this project">Delete</button>
  <span class="sp"></span>
  <span class="cur" id="projCur">—</span>
  <span class="sp"></span>
  <button class="mini" id="btnExport" title="Download this project as a .json file">⬇ Export .json</button>
  <button class="mini" id="btnImport" title="Load a .json project file from your computer">⬆ Import .json</button>
  <input type="file" id="fileImport" accept="application/json,.json" style="display:none">
</div>

<div class="wrap">
  <!-- SOURCE BIN -->
  <div class="col" id="binCol">
    <h2>Source clips</h2>
    <div id="bin"></div>
  </div>

  <!-- PREVIEW / TRIMMER -->
  <div class="col center">
    <div id="stageWrap">
      <!-- one <video class="clipvid"> per clip is injected here -->
      <div id="capOverlay"><span></span></div>
      <div id="endcard"><img id="ecLogo" alt=""><div id="ecLines"></div></div>
    </div>
    <div class="transport">
      <button id="btnPlayTl" class="primary">▶ Play timeline</button>
      <button id="btnStop">■ Stop</button>
      <span class="tcode" id="tlTime">0.0 / 0.0s</span>
    </div>
    <div class="scrub">
      <button class="mini" id="btnPlaySeg" title="Plays ONLY the selected segment, then stops. Use ▶ Play timeline above to play the whole edit.">▶ this segment only</button>
      <input type="range" id="scrub" min="0" max="100" step="0.01" value="0">
      <span class="tcode" id="vidTime">0.00s</span>
    </div>
    <div class="trim">
      <h3>Trim selected segment — <span id="trimName" style="color:var(--txt)">none</span></h3>
      <div class="row">
        <button class="mini" id="btnSetIn">⇤ Set IN = playhead</button>
        <button class="mini" id="btnSetOut">Set OUT = playhead ⇥</button>
        <label>in <input type="number" id="inIn" step="0.1" style="width:70px"></label>
        <label>dur <input type="number" id="inDur" step="0.1" style="width:70px"></label>
      </div>
      <div class="row">
        <label>zoom <input type="number" id="inZoom" step="0.05" min="1" style="width:64px"></label>
        <label>anchor
          <select id="inAnchor">
            <option>center</option><option>top</option><option>bottom</option><option>left</option><option>right</option>
          </select></label>
        <button class="mini" id="btnAddSel">+ Add this clip to timeline</button>
      </div>
    </div>
  </div>

  <!-- TIMELINE + SETTINGS -->
  <div class="col" id="tlCol">
    <h2>Timeline</h2>
    <div id="timeline"></div>
    <div class="settings">
      <div class="row"><label>Canvas</label>
        <select id="setCanvas"><option value="9x16">9:16 Reels/Stories</option>
          <option value="4x5">4:5 Meta feed</option><option value="16x9">16:9 YouTube</option></select></div>
      <div class="row"><label>Music</label><select id="setMusic"></select></div>
      <div class="row"><label>End card</label><button class="mini" id="btnEndcard">🎬 Edit end card…</button></div>
    </div>
    <div class="status" id="status">Loading…</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div id="ecModal" class="modal" style="display:none">
  <div class="modal-card">
    <div class="modal-hd"><b>🎬 End Card</b><button class="mini" id="ecClose">✕ Done</button></div>
    <div class="modal-body">
      <div><label class="ck"><input type="checkbox" id="ecEnabled"> Show end card</label>
        <label>Hold <input type="number" id="ecDur" step="0.1" min="0.5" style="width:60px"> s</label></div>
      <hr>
      <div class="sec">Background</div>
      <div><label>Style <select id="ecBgMode">
        <option value="gradient">Gradient</option>
        <option value="color">Solid color</option>
        <option value="transparent">Transparent (play over last clip)</option></select></label></div>
      <div id="ecGradRow"><label>Preset <select id="ecGradPreset"></select></label>
        <label>Start <input type="color" id="ecGradStart"></label>
        <label>End <input type="color" id="ecGradEnd"></label>
        <label>Angle <input type="number" id="ecGradAngle" style="width:54px">°</label></div>
      <div id="ecColorRow"><label>Color <input type="color" id="ecBgColor"></label></div>
      <hr>
      <div class="sec">Logo</div>
      <div><label class="ck"><input type="checkbox" id="ecLogoShow"> Show logo</label></div>
      <div><label>Size <input type="range" id="ecLogoScale" min="0.2" max="1" step="0.01"></label>
        <label>X <input type="range" id="ecLogoX" min="0" max="1" step="0.01"></label>
        <label>Y <input type="range" id="ecLogoY" min="0" max="1" step="0.01"></label></div>
      <hr>
      <div class="sec">Text lines</div>
      <div id="ecLinesEditor" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const api = (u,o) => fetch(u,o).then(r=>r.json());
let MAN = {clips:[], byId:{}, music:[]};
let EDL = null;
let sel = -1;          // selected segment index
const stage = $('#stageWrap');
const vids = {};       // clip id -> its own preloaded, muted <video> element
let activeId = null;   // currently visible clip id
const ASPECT = {'9x16':[9,16], '4x5':[4,5], '16x9':[16,9]};
function getVid(id){
  if(vids[id]) return vids[id];
  const c=MAN.byId[id]; if(!c) return null;
  const v=document.createElement('video');
  v.className='clipvid'; v.muted=true; v.playsInline=true; v.preload='auto'; v.src=c.url;
  v.addEventListener('timeupdate',()=>{ if(!tlPlaying && activeId===id){ $('#vidTime').textContent=fmt(v.currentTime)+'s'; }});
  stage.insertBefore(v, $('#capOverlay')); vids[id]=v; return v;
}
function showVid(id){ for(const k in vids) vids[k].style.display=(k===id)?'block':'none'; activeId=id; }
function activeVid(){ return vids[activeId]||null; }
function withClip(id, cb){ const v=getVid(id); if(!v){ if(cb)cb(null); return; }
  if(v.readyState>=1){ if(cb)cb(v); }
  else v.addEventListener('loadedmetadata', function h(){ v.removeEventListener('loadedmetadata',h); if(cb)cb(v); }); }

function toast(m){ const t=$('#toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2200); }
function fmt(n){ return (Math.round(n*10)/10).toFixed(1); }

function sizeStage(){
  const [aw,ah]=ASPECT[EDL.settings.canvas]||[9,16];
  const wrap=$('#stageWrap'); const maxH=Math.min(560, window.innerHeight-260); const maxW=520;
  let h=maxH, w=h*aw/ah; if(w>maxW){ w=maxW; h=w*ah/aw; }
  wrap.style.width=w+'px'; wrap.style.height=h+'px';
  // caption sizing approximates render: fontsize = captionSize * canvasWidth, scaled to stage width
  const fpx = (EDL.settings.captionSize||0.058) * w * 1.0;
  $('#capOverlay').style.fontSize = fpx+'px';
  $('#capOverlay').style.top = ((EDL.settings.captionY||0.62)*100)+'%';
  buildEndcard(normEndcard(EDL.settings));   // re-fit end card to the new stage size
}

function anchorPos(a){ return {center:'50% 50%',top:'50% 0%',bottom:'50% 100%',left:'0% 50%',right:'100% 50%'}[a]||'50% 50%'; }
function applyFraming(seg, v){ v=v||vids[activeId]; if(!v) return;
  const pos=anchorPos(seg.anchor); const z=Math.max(seg.zoom||1,1);
  v.style.objectPosition=pos; v.style.transformOrigin=pos; v.style.transform = z>1?`scale(${z})`:'none';
}
function showCap(text){ const o=$('#capOverlay'); if(text&&text.trim()){ o.querySelector('span').textContent=text; o.style.display='block'; } else { o.style.display='none'; } }

/* ---------- end card ---------- */
const FONTS={ arial:"'Arial Black',Arial,sans-serif", cooper:"'Cooper Std Black','Cooper Black',serif", meowijuana:"'Meowijuana',cursive" };
const GRADIENTS=[
  {n:'Sierra Sunshine (Toys/Reviews)',s:'#f5e020',e:'#e87820'},
  {n:'Meowi Waui',s:'#c8e830',e:'#1a7a30'},
  {n:'Garden Pawty',s:'#c8f0b8',e:'#5aa830'},
  {n:'Kalico Kush',s:'#f5c842',e:'#d4540a'},
  {n:'Whisker Tickler',s:'#f5d020',e:'#e8540a'},
  {n:'Cloud 9',s:'#5ec8f0',e:'#8abf2a'},
  {n:'Mice Dreams (Lavender)',s:'#d4b8e0',e:'#7b2d8b'},
  {n:'Purrple Passion',s:'#f472b6',e:'#7c1fa1'},
  {n:'Winter Lift',s:'#a8d8f0',e:'#2090b8'},
  {n:'Harvest Moon',s:'#f5c030',e:'#c85010'},
];
function normEndcard(s){
  let ec=s.endcard;
  if(Array.isArray(ec) || ec==null){
    const a=(Array.isArray(ec)?ec:['MEOWIJUANA','CATNIP JOINTS','SHOP NOW']).concat(['','','']).slice(0,3);
    ec={ enabled:true, dur:(+s.endcardDur||2.6),
      bg:{mode:'gradient',color:'#111111',start:'#f5e020',end:'#e87820',angle:170},
      logo:{show:true,scale:0.8,x:0.5,y:0.30},
      lines:[
        {text:'',font:'meowijuana',color:'#f07830',size:0.075,y:0.30,button:false,bg:'#f07830'},
        {text:a[1],font:'cooper',color:'#257741',size:0.05,y:0.56,button:false,bg:'#f07830'},
        {text:a[2],font:'cooper',color:'#ffffff',size:0.05,y:0.68,button:true,bg:'#f07830'} ] };
  }
  ec.enabled=ec.enabled!==false; ec.dur=+ec.dur||2.6;
  ec.bg=Object.assign({mode:'gradient',color:'#111111',start:'#f5e020',end:'#e87820',angle:170}, ec.bg||{});
  ec.logo=Object.assign({show:true,scale:0.8,x:0.5,y:0.30}, ec.logo||{});
  ec.lines=(ec.lines||[]).map(l=>Object.assign({text:'',font:'cooper',color:'#ffffff',size:0.05,y:0.6,button:false,bg:'#f07830'},l));
  while(ec.lines.length<3) ec.lines.push({text:'',font:'cooper',color:'#ffffff',size:0.05,y:0.6,button:false,bg:'#f07830'});
  s.endcard=ec; return ec;
}
function buildEndcard(ec){
  ec=ec||normEndcard(EDL.settings);
  const W=$('#stageWrap').clientWidth||360, card=$('#endcard'), bg=ec.bg;
  card.style.background = bg.mode==='transparent' ? 'transparent'
    : (bg.mode==='color' ? bg.color : `linear-gradient(${bg.angle||170}deg, ${bg.start}, ${bg.end})`);
  const lg=$('#ecLogo');
  if(ec.logo.show && MAN.logo){ lg.src=MAN.logo; lg.style.display='block'; lg.style.position='absolute';
    lg.style.width=(ec.logo.scale*100)+'%'; lg.style.height='auto'; lg.style.margin='0';
    lg.style.left=(ec.logo.x*100)+'%'; lg.style.top=(ec.logo.y*100)+'%'; lg.style.transform='translate(-50%,-50%)'; }
  else lg.style.display='none';
  const box=$('#ecLines'); box.innerHTML='';
  ec.lines.forEach(ln=>{ if(!ln.text||!ln.text.trim()) return;
    const d=document.createElement('div'); d.textContent=ln.text;
    d.style.cssText='position:absolute;left:'+(50)+'%;top:'+(ln.y*100)+'%;transform:translate(-50%,-50%);white-space:nowrap;font-weight:800;line-height:1;';
    d.style.fontFamily=FONTS[ln.font]||FONTS.cooper; d.style.fontSize=(ln.size*W)+'px'; d.style.color=ln.color;
    if(ln.button){ d.style.background=ln.bg; const p=ln.size*W; d.style.padding=(p*0.38)+'px '+(p*0.55)+'px'; d.style.borderRadius=(p*0.3)+'px'; }
    box.appendChild(d);
  });
}

/* ---------- bin ---------- */
function renderBin(){
  const bin=$('#bin'); bin.innerHTML='';
  let cur='';
  MAN.clips.forEach(c=>{
    if(c.product!==cur){ cur=c.product; const g=document.createElement('div'); g.className='grp'; g.textContent=cur; bin.appendChild(g); }
    const d=document.createElement('div'); d.className='clip';
    d.innerHTML=`<img src="${c.thumb}" loading="lazy"><div class="meta"><b>${c.label}</b>
      <span>${c.id} · ${fmt(c.dur)}s · ${c.w}×${c.h}</span></div>`;
    d.onclick=()=>{ stop(); sel=-1; renderTimeline(); $('#trimName').textContent=c.label;
      withClip(c.id, v=>{ if(!v) return; showVid(c.id); applyFraming({anchor:'center',zoom:1}, v); try{v.currentTime=0;}catch(e){} showCap(''); });
      $('#btnAddSel').dataset.id=c.id; };
    bin.appendChild(d);
  });
}

/* ---------- timeline ---------- */
function totalDur(){ let t=0; EDL.segments.forEach(s=>t+=(+s.dur||0)); const ec=normEndcard(EDL.settings); return t+(ec.enabled?ec.dur:0); }
function renderTimeline(){
  const tl=$('#timeline'); tl.innerHTML='';
  EDL.segments.forEach((s,i)=>{
    const c=MAN.byId[s.id]; const name=c?c.label:s.id; const cdur=(c&&c.dur)||60;
    const el=document.createElement('div'); el.className='seg'+(i===sel?' sel':'');
    el.innerHTML=`
      <div class="top"><span class="hd">${i+1}. ${name}</span>
        <div class="ctl">

        </div></div>
      <div class="nums">
        <label>in<input type="number" step="0.1" data-f="in" value="${s.in}"></label>
        <label>dur<input type="number" step="0.1" data-f="dur" value="${s.dur}"></label>
        <label>zoom<input type="number" step="0.05" min="1" data-f="zoom" value="${s.zoom||1}"></label>
        <label>anchor<select data-f="anchor">${['center','top','bottom','left','right'].map(a=>`<option ${a===(s.anchor||'center')?'selected':''}>${a}</option>`).join('')}</select></label>
      </div>

      <div class="cscrub-row">

        <input type="range" class="cscrub" min="0" max="${cdur}" step="0.05" value="${s.in}">
        <span class="csct">${fmt(s.in)}s</span>
      </div>
      <div class="cscrub-row">
        <button class="mini cbtn" data-sa="in" title="Set this clip's IN point to the scrub position">⇤ Set IN</button>
        <button class="mini cbtn" data-sa="out" title="Set this clip's OUT (duration) to the scrub position">Set OUT ⇥</button>
        <span class="csct" style="flex:1;text-align:left">in ${fmt(s.in)} · ${fmt(s.dur)}s</span>
      </div>`;
    el.querySelector('.hd').onclick=()=>selectSeg(i);
    el.querySelectorAll('[data-f]').forEach(inp=>{
      inp.onchange=()=>{ let v=inp.value; if(['in','dur','zoom'].includes(inp.dataset.f)) v=parseFloat(v)||0;
        EDL.segments[i][inp.dataset.f]=v; updateTotal(); if(i===sel) loadSegIntoTrim(); };
    });
    el.querySelectorAll('[data-a]').forEach(b=>{ b.onclick=()=>segAction(b.dataset.a,i); });
    const cscrub=el.querySelector('.cscrub'), csct=el.querySelector('.csct');
    cscrub.oninput=()=>{ const t=parseFloat(cscrub.value)||0; csct.textContent=fmt(t)+'s';
      stop(); sel=i; tl.querySelectorAll('.seg').forEach((x,xi)=>x.classList.toggle('sel',xi===i));
      $('#inIn').value=s.in; $('#inDur').value=s.dur; $('#inZoom').value=s.zoom||1; $('#inAnchor').value=s.anchor||'center'; $('#trimName').textContent=name;
      withClip(s.id, v=>{ if(!v) return; showVid(s.id); applyFraming(s,v); try{v.currentTime=t;}catch(e){} showCap(s.cap); });
    };
    el.querySelectorAll('[data-sa]').forEach(b=>{ b.onclick=(ev)=>{ ev.stopPropagation(); const t=parseFloat(cscrub.value)||0; const a=b.dataset.sa;
      if(a==='play'){ stop(); selectSeg(i); playRange(EDL.segments[i], ()=>{}); }
      else if(a==='in'){ s.in=Math.round(t*100)/100; renderTimeline(); selectSeg(i); toast('IN set to '+fmt(t)+'s'); }
      else if(a==='out'){ const d=Math.round((t-(+s.in||0))*100)/100; if(d>0){ s.dur=d; renderTimeline(); selectSeg(i); toast('Duration set to '+fmt(d)+'s'); } else toast('Scrub past the IN point first'); }
    }; });
    tl.appendChild(el);
  });
  updateTotal();
}
function updateTotal(){ const t=totalDur(); $('#totalPill').textContent=fmt(t)+'s · '+EDL.settings.canvas;
  if(playhead>t) playhead=0;
  if(!tlPlaying){ $('#tlTime').textContent=fmt(Math.min(playhead,t))+' / '+fmt(t)+'s'; $('#scrub').max=t; $('#scrub').value=Math.min(playhead,t); } }
function segAction(a,i){
  if(a==='up'&&i>0){ [EDL.segments[i-1],EDL.segments[i]]=[EDL.segments[i],EDL.segments[i-1]]; sel=i-1; }
  else if(a==='down'&&i<EDL.segments.length-1){ [EDL.segments[i+1],EDL.segments[i]]=[EDL.segments[i],EDL.segments[i+1]]; sel=i+1; }
  else if(a==='dup'){ EDL.segments.splice(i+1,0,JSON.parse(JSON.stringify(EDL.segments[i]))); sel=i+1; }
  else if(a==='del'){ EDL.segments.splice(i,1); if(sel>=EDL.segments.length) sel=EDL.segments.length-1; }
  renderTimeline();
}
function selectSeg(i){ stop(); sel=i; renderTimeline(); loadSegIntoTrim(); }
function loadSegIntoTrim(){
  if(sel<0||!EDL.segments[sel]) return; const s=EDL.segments[sel]; const c=MAN.byId[s.id];
  $('#trimName').textContent=c?c.label:s.id;

}

/* ---------- playback ---------- */
const music = new Audio();
let tlPlaying=false, pbToken=0, segRaf=null, clockRaf=null, segTO=null, clockTimer=null, playhead=0;
function stop(){ tlPlaying=false; pbToken++; cancelAnimationFrame(segRaf); cancelAnimationFrame(clockRaf); clearInterval(clockTimer); clearTimeout(segTO);
  const v=activeVid(); if(v){ v.onseeked=null; try{v.pause();}catch(e){} } music.pause();
  $('#endcard').style.display='none'; $('#btnPlayTl').textContent='▶ Play timeline'; }   // note: keeps playhead where it stopped

// Show the frame at the current timeline playhead (used when scrubbing while stopped).
function seekToPlayhead(){
  const ec=normEndcard(EDL.settings);
  let acc=0, found=null, off=0;
  for(const s of EDL.segments){ const d=Math.max(0.05,+s.dur||1); if(playhead < acc+d){ found=s; off=playhead-acc; break; } acc+=d; }
  $('#tlTime').textContent=fmt(playhead)+' / '+fmt(totalDur())+'s'; $('#vidTime').textContent=fmt(playhead)+'s';
  if(found){ const v=getVid(found.id); if(v){ showVid(found.id); applyFraming(found,v); try{v.currentTime=(+found.in||0)+off;}catch(e){} showCap(found.cap); } $('#endcard').style.display='none'; }
  else if(ec.enabled){                                 // playhead is in the end-card region
    showCap('');
    if(ec.bg.mode==='transparent' && EDL.segments.length){ const last=EDL.segments[EDL.segments.length-1]; const v=getVid(last.id);
      if(v){ showVid(last.id); applyFraming(last,v); try{v.currentTime=(+last.in||0)+(+last.dur||0)+(playhead-acc);}catch(e){} } }
    buildEndcard(ec); $('#endcard').style.display='flex';
  } else { $('#endcard').style.display='none'; }
}

// Play one segment's [in, in+dur] using that clip's OWN preloaded, muted element.
// No src-swapping (which interrupts play()); we just seek + show + play that element.
function playRange(seg, onDone){
  cancelAnimationFrame(segRaf); clearTimeout(segTO);
  const my=++pbToken;
  const v=getVid(seg.id);
  const start=Math.max(0,+seg.in||0), dur=Math.max(0.05,+seg.dur||1), end=start+dur;
  let done=false;
  const finish=()=>{ if(done||my!==pbToken) return; done=true; clearTimeout(segTO); cancelAnimationFrame(segRaf); if(v){try{v.pause();}catch(e){}} if(onDone) onDone(); };
  segTO=setTimeout(finish, dur*1000+1200);   // backstop so the timeline never stalls
  if(!v){ return; }
  const watch=()=>{ if(my!==pbToken) return;
    if(v.currentTime>=end-0.03 || v.ended){ finish(); return; }
    segRaf=requestAnimationFrame(watch); };
  const go=()=>{ if(my!==pbToken) return; v.onseeked=null; applyFraming(seg, v); showVid(seg.id); showCap(seg.cap);
    const p=v.play(); if(p&&p.catch) p.catch(()=>{}); segRaf=requestAnimationFrame(watch); };
  const seekThenGo=()=>{ if(my!==pbToken) return;
    if(Math.abs(v.currentTime-start)>0.06){ v.onseeked=()=>{ v.onseeked=null; go(); }; try{v.currentTime=start;}catch(e){ go(); } }
    else go(); };
  if(v.readyState>=1) seekThenGo();
  else v.addEventListener('loadedmetadata', function h(){ v.removeEventListener('loadedmetadata',h); seekThenGo(); });
}

// Master wall-clock scheduler: advancement is driven by real elapsed time, NOT video
// events — so the timeline can never stall waiting on a clip to load/seek/play. Each
// segment's clip is seeked + played best-effort and kept loosely in sync.
function playTimeline(){
  if(!EDL.segments.length) return; stop(); tlPlaying=true; pbToken++;
  $('#btnPlayTl').textContent='❚❚ Stop'; $('#endcard').style.display='none';
  if(MAN.music.includes(EDL.settings.music)){ music.src='/sources/music/'+encodeURIComponent(EDL.settings.music);
    music.currentTime=0; music.volume=0.5; music.play().catch(()=>{}); }
  const segs=EDL.segments, bounds=[]; let acc=0;
  segs.forEach(s=>{ const d=Math.max(0.05,+s.dur||1); bounds.push({a:acc,b:acc+d,s}); acc+=d; });
  const ec=normEndcard(EDL.settings);
  const vidTotal=acc, endDur=(ec.enabled?ec.dur:0), total=vidTotal+endDur;
  if(playhead>=total-0.05) playhead=0;                // restart only if parked at the very end (past the end card)
  let curIdx=-1; const t0=performance.now()-playhead*1000;   // resume from the playhead
  const tick=()=>{
    if(!tlPlaying) return;
    const e=(performance.now()-t0)/1000;
    playhead=Math.min(e,total);
    $('#tlTime').textContent=fmt(playhead)+' / '+fmt(total)+'s';
    $('#scrub').max=total; $('#scrub').value=playhead;   // scrub = smooth timeline playhead
    $('#vidTime').textContent=fmt(playhead)+'s';
    if(e>=vidTotal){                                   // end-card phase
      if(ec.enabled){
        if(curIdx!==999){ curIdx=999; buildEndcard(ec); $('#endcard').style.display='flex'; showCap('');
          if(ec.bg.mode==='transparent'){ const a=activeVid(); if(a&&a.paused){ const p=a.play(); if(p&&p.catch)p.catch(()=>{}); } }
          else { const a=activeVid(); if(a){try{a.pause();}catch(_){}} } }
        else if(ec.bg.mode==='transparent'){ const a=activeVid(); if(a&&a.paused){ const p=a.play(); if(p&&p.catch)p.catch(()=>{}); } }
      }
      if(e>=total){ playhead=0; stop(); $('#scrub').value=0; $('#tlTime').textContent='0.0 / '+fmt(total)+'s'; }
      return;
    }
    let idx=0; for(let k=0;k<bounds.length;k++){ if(e>=bounds[k].a && e<bounds[k].b){ idx=k; break; } if(k===bounds.length-1) idx=k; }
    const bd=bounds[idx], s=bd.s, v=getVid(s.id), want=(+s.in||0)+(e-bd.a);
    if(idx!==curIdx){                                  // entered a new segment
      curIdx=idx;
      for(const k in vids){ if(vids[k]!==v){ try{vids[k].pause();}catch(_){} } }
      if(v){ applyFraming(s,v); showVid(s.id); try{v.currentTime=Math.max(0,want);}catch(_){}
        const p=v.play(); if(p&&p.catch)p.catch(()=>{}); }
      showCap(s.cap);
    } else if(v){                                      // mid-segment: keep clip synced + playing
      if(Math.abs(v.currentTime-want)>0.35){ try{v.currentTime=Math.max(0,want);}catch(_){} }
      if(v.paused){ const p=v.play(); if(p&&p.catch)p.catch(()=>{}); }
    }
  };
  clearInterval(clockTimer); clockTimer=setInterval(tick, 33); tick();   // setInterval keeps running even if the tab loses focus
}

function applyEDL(edl){
  EDL = edl || {};
  if(!EDL.settings) EDL.settings={};
  const s=EDL.settings;
  if(!s.canvas) s.canvas='9x16'; if(s.captionSize==null) s.captionSize=0.058;
  if(s.captionY==null) s.captionY=0.62;
  if(!EDL.segments) EDL.segments=[];
  normEndcard(s);   // migrate/normalize end-card settings
  const ms=$('#setMusic'); ms.innerHTML=MAN.music.map(m=>`<option ${m===s.music?'selected':''}>${m}</option>`).join('');
  if(!MAN.music.includes(s.music)) s.music=MAN.music[0]||'';
  $('#setMusic').value=s.music; $('#setCanvas').value=s.canvas;
  sel = EDL.segments.length?0:-1;
  renderBin(); renderTimeline(); sizeStage();
  [...new Set(EDL.segments.map(s=>s.id))].forEach(getVid);  // preload timeline clips
  if(sel>=0) selectSeg(0); else stop();
}

}
async function projLoad(file){

}
async function saveAs(name){
  const r=await api('/api/project',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, edl:EDL})});
  if(r.ok){ setCur({file:r.file,name:r.name}); await loadProjects(r.file); toast('Saved “'+r.name+'”'); }
  else toast('Save failed');
}

  applyEDL({name:'', settings:{canvas:EDL.settings.canvas||'9x16', music:MAN.music[0]||'', endcard:['MEOWIJUANA','CATNIP JOINTS','SHOP NOW'], captionSize:0.058, captionY:0.62, endcardDur:2.6}, segments:[]});

async function projDelete(){ if(!curProj) return toast('No saved project selected');
  if(!confirm('Delete project “'+curProj.name+'”? This removes the file.')) return;

function exportJSON(){ const name=(curProj&&curProj.name)||'project';
  const blob=new Blob([JSON.stringify(Object.assign({name},EDL),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=(name.replace(/[^a-z0-9]+/gi,'-').toLowerCase()||'project')+'.json'; a.click(); URL.revokeObjectURL(url); }

  r.readAsText(file); }

async function boot(reload){
  MAN = await api('/api/manifest'); MAN.byId={}; MAN.clips.forEach(c=>MAN.byId[c.id]=c);
  if(reload){ renderBin(); renderTimeline(); toast('Clips reloaded'); return; }
  const list=await loadProjects();
  if(list.length) await projLoad(list[0].file);
  else { applyEDL(await api('/api/edl')); setCur(null); }
  $('#status').textContent=MAN.clips.length+' clips loaded · '+list.length+' saved project(s).';
}
boot();
</script>
</body>
</html>
